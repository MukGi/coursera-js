<!DOCTYPE html>

<html lang="en">
    <head>
    
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    </head>
    <body>
        <div class="maindiv">
            
        <h1>Simple Interest Calculator</h1> <!-- Calculator title-->

        Amount <input type="number"  id="principal">  <br/> <!-- User Amount input-->

        Rate <input type="range" id="rate_slider" min="1" max="20" value="10.25" step="0.25" > <!-- Rate Slider-->
        <span id="rate_value"> 10.25</span>%  <br/>

        No. of Years <input type="number"  id="years" list="choice"> <!-- Years Input-->
        <datalist id="choice">
            <option value="1"></option>
            <option value="2"></option>
            <option value="3"></option>
            <option value="4"></option>
            <option value="5"></option>
            <option value="6"></option>
            <option value="7"></option>
            <option value="8"></option>
            <option value="9"></option>
            <option value="10"></option>
        </datalist>
        <br/>
        Interest : <span id="result"></span><br> <!-- Show result of interest-->

        <button onclick="compute()">Compute Interest</button> <!-- S.I calculation button-->
        <span id="result"></span>
        </div> 

        <footer>
            &#169; This Calculator belongs to Gift M
        </footer>
        <script src="script.js"></script>
    </body>
</html>
